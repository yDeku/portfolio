<!DOCTYPE html>

<head>

<body>

<header>
  <div class="container nav">
    <a href="#home" class="logo-link">
      <img src="assets/logo.png" alt="YDK Developer" class="site-logo">
    </a>

    <button class="menu-button" id="menuButton" aria-label="Abrir menu">
      <span></span>
      <span></span>

    <a href="#home">Home</a>
    <a href="#projects">Projects</a>

<main>

  <!-- HOME / INTRO -->
  <section id="home" class="home-section">
    <div class="home-bg"></div>

    <div class="home-content reveal">
      <img src="assets/logo.png" alt="YDK Developer" class="hero-logo">

  <!-- PROJECTS -->
  <section id="projects">
    <div class="container">
      <h3 class="section-title reveal">Projects</h3>

          <h4>Star Wars</h4>
          <p>Coming soon...</p>
        </div>

    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact">
    <div class="container">
      <h3 class="section-title reveal">Contact</h3>

      <div class="contacts reveal">

        <div class="contact-inline" id="discord">
          <img src="assets/discord.png" class="contact-icon" alt="Discord">

            <span>Discord</span>
            <strong>anakinsky01</strong>
          </div>

        </div>

        <div class="contact-inline" id="whatsapp">
          <img src="assets/whatsapp.png" class="contact-icon" alt="WhatsApp">

          <div class="contact-text">
            <span>WhatsApp</span>
            <strong>+55 82 9 9323-3461</strong>
          </div>

          <small class="contact-feedback">open</small>

<footer>

    <p>© 2026 YDK</p>
  </div>
